# Major opera houses to track.
#
# `parser` selects which function in opera_schedule_tracker/sources/ fetches
# and parses this house's schedule (see PARSERS in
# opera_schedule_tracker/sources/__init__.py). None of these five sites
# expose schema.org JSON-LD, so each has a dedicated parser that reads the
# calendar page's rendered text (see each parser module's docstring for the
# page layout it expects and how confident that layout is).
#
# Status (2026-07-08): all five parsers are implemented and unit-tested,
# but each was designed from screenshots rather than real HTML/DOM (this
# dev environment's network access to these domains is blocked, so we
# couldn't inspect live markup — see README for how we gathered page
# layouts instead). None have been run against the live sites yet. If a
# run logs "No performances extracted for ...", the real page has likely
# drifted from what the parser expects and needs adjustment.

opera_houses:
  - name: "Teatro alla Scala"
    url: "https://www.teatroallascala.org/en/calendar.html"
    parser: "scala"

  - name: "Wiener Staatsoper"
    # Monthly calendar pages, e.g. .../en/calendar/2026/september/ — the
    # month/year segment is generated dynamically at run time (see
    # opera_schedule_tracker/sources/wiener_staatsoper.py) rather than
    # hardcoded here, so `url` is the base to build from.
    url: "https://www.wiener-staatsoper.at/en/calendar/"
    parser: "wiener_staatsoper"
    months_ahead: 3

  - name: "Royal Ballet and Opera"
    url: "https://www.rbo.org.uk/tickets-and-events"
    parser: "rbo"

  - name: "Opera national de Paris"
    url: "https://www.operadeparis.fr/en/programme-and-tickets"
    parser: "paris_opera"

  - name: "Metropolitan Opera"
    url: "https://www.metopera.org/calendar/"
    parser: "met_opera"
